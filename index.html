<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VLBI Interferometry Simulator</title>
  <meta name="description" content="Interactive, research-grade simulator of Very Long Baseline Interferometry (VLBI) image reconstruction — the technique behind the Event Horizon Telescope's black-hole images." />

  <!-- The live app lives in /vlbi-react/. This root page exists only to forward the
       bare URL there. Three layers, most immediate first: JS replace() (also carries
       any ?query/#hash and keeps the stub out of back-button history), then a meta
       refresh for no-JS clients, then a visible link as the final fallback. Paths are
       relative so this works identically on GitHub Pages (…/astrophysics-applet/) and
       when served locally. -->
  <link rel="canonical" href="./vlbi-react/" />
  <meta http-equiv="refresh" content="0; url=./vlbi-react/" />
  <script>
    location.replace('./vlbi-react/' + location.search + location.hash);
  </script>

  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #0a0a0a;
      color: #e8e6e1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.6;
    }
    main { padding: 2rem; }
    .spark { color: #c4a555; letter-spacing: 0.02em; font-weight: 600; }
    p { margin: 0.4rem 0; color: #b8b4ac; }
    a {
      color: #c4a555;
      text-decoration: none;
      border-bottom: 1px solid rgba(196, 165, 85, 0.4);
      padding-bottom: 1px;
    }
    a:hover { border-bottom-color: #c4a555; }
  </style>
</head>
<body>
  <main>
    <p class="spark">VLBI Interferometry Simulator</p>
    <p>Loading the simulator…</p>
    <p><a href="./vlbi-react/">Continue to the simulator &rarr;</a></p>
  </main>
</body>
</html>
